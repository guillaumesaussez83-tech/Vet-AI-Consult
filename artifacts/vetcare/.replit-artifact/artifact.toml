kind = "web"
  previewPath = "/"
  title = "VétoAI - Logiciel Vétérinaire"
  version = "1.0.0"
  id = "artifacts/vetcare"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 21313

  [services.development]
  run = "pnpm --filter @workspace/vetcare run dev"

  [services.production]
  publicDir = "artifacts/vetcare/dist/public"
  serve = "static"

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/vetcare", "run", "build"]

  [services.production.build.env]
  BASE_PATH = "/"
  NODE_ENV = "production"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "21313"
  BASE_PATH = "/"
  